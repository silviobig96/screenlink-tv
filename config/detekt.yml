complexity:
  LongMethod:
    threshold: 80
  LongParameterList:
    functionThreshold: 10
    constructorThreshold: 10
  NestedBlockDepth:
    threshold: 5
  TooManyFunctions:
    thresholdInClasses: 15
naming:
  FunctionNaming:
    functionPattern: "[a-zA-Z][a-zA-Z0-9]*"
style:
  MagicNumber:
    active: false
  MaxLineLength:
    maxLineLength: 140
  UnusedPrivateMember:
    allowedNames: "(_|ignored|expected|serialVersionUID)"
